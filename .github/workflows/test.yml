name: Test

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE*'
      - 'CONTRIBUTING.md'
      - '.gitignore'
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE*'
      - 'CONTRIBUTING.md'
      - '.gitignore'

jobs:
  unit-tests:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read .nvmrc
        run: echo "NVMRC=$(cat .nvmrc)" >> $GITHUB_OUTPUT
        id: nvm

      - uses: actions/setup-node@v4
        with:
          node-version: "${{ steps.nvm.outputs.NVMRC }}"
          cache: "pnpm"

      - name: Enable corepack
        run: corepack enable

      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:unit

  integration-tests:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: extractions/setup-just@v2
        with:
          just-version: 1.5.0
      - uses: actions/checkout@v4

      - name: Read .nvmrc
        run: echo "NVMRC=$(cat .nvmrc)" >> $GITHUB_OUTPUT
        id: nvm

      - uses: actions/setup-node@v4
        with:
          node-version: "${{ steps.nvm.outputs.NVMRC }}"
          cache: "pnpm"

      - name: Enable corepack
        run: corepack enable

      - run: just test-integration-ci
