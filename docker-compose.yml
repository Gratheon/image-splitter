version: '3.8'
services:
  image-splitter:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command:
      node --max-old-space-size=4096 /app/app/image-splitter.js
    environment:
      - ENV_ID=prod
      - NODE_OPTIONS=--max-old-space-size=4096
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://127.0.0.1:4318}
      - OTEL_SERVICE_NAME=image-splitter
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment.name=prod,service.namespace=gratheon
      - HYPERDX_API_KEY=${HYPERDX_API_KEY:-}
    ports:
      - 8800:8800
    volumes:
      - ./tmp:/app/tmp
    restart: always
    network_mode: host
